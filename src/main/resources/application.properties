# ==============================
# SERVER SETTINGS
# ==============================
# हाम्रो app कुन port मा run हुन्छ
server.port=${APP_PORT:8080}






# ==============================
# DATABASE CONNECTION
# ==============================
# PostgreSQL को address
spring.datasource.url=${DB_URL}



# तिम्रो PostgreSQL username (default: postgres)
spring.datasource.username=${DB_USERNAME}

# तिम्रो PostgreSQL password (install गर्दा राखेको)
spring.datasource.password=${DB_PASSWORD}

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver






# ==============================
# JPA (Java Persistence API)SETTINGS
# ==============================
# Java को model हेरेर automatically table बनाउँछ
spring.jpa.hibernate.ddl-auto=update

# Database type भन्छ
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Console मा SQL queries देखाउँछ (learning को लागि)
spring.jpa.show-sql=true

# SQL राम्रोसँग format गरेर देखाउँछ
spring.jpa.properties.hibernate.format_sql=true




#DevTools disable auto restart nagarna lagi harek line change garda change nahus vanera
spring.devtools.restart.enabled=false



# ===== EMAIL (Gmail) =====
# Gmail को App Password चाहिन्छ (तल explain गर्छु)

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}



spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# ===== SSL certificate verify गर्न  =====
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com 



# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB




# Static resources uploads folder serve गर्न
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/


# ==============================
# APP NAME
# ==============================
spring.application.name=ShopOsaka