<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            🛒 ShopOsaka
            <span class="badge bg-warning text-dark ms-2">ADMIN</span>
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" id="adminEmail"></span>
            
        </div>
    </div>
</nav>

<div class="d-flex" style="min-height: calc(100vh - 56px);">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar bg-dark text-white"
         style="width: 220px; min-height: 100%; padding: 20px 10px;">

        <p class="text-muted small fw-bold px-2 mb-2">MAIN MENU</p>

        <div class="d-grid gap-1">
            <button class="btn sidebar-btn active-sidebar"
                    id="btn-dashboard"
                    onclick="showTab('dashboard')">
                <i class="fas fa-chart-pie me-2"></i>Dashboard
            </button>
            <button class="btn sidebar-btn"
                    id="btn-products"
                    onclick="showTab('products')">
                <i class="fas fa-box me-2"></i>Products
            </button>
           
            <button class="btn sidebar-btn"
                    id="btn-orders"
                    onclick="showTab('orders')">
                <i class="fas fa-shopping-bag me-2"></i>Orders
            </button>
            <button class="btn sidebar-btn"
                    id="btn-users"
                    onclick="showTab('users')">
                <i class="fas fa-users me-2"></i>Users
            </button>
        </div>

        <!-- Back to Store -->
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="/" class="btn sidebar-btn w-100">
                <i class="fas fa-store me-2"></i>View Store
            </a>
            
            <button class="btn sidebar-btn w-100 mt-2"
        onclick="logout()">
    <i class="fas fa-sign-out-alt me-2"></i>Logout
</button>
        </div>
        
        
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="flex-grow-1 p-4 bg-light">

        <!-- ===== DASHBOARD TAB ===== -->
        <div id="tab-dashboard">
            <h4 class="fw-bold mb-4">Dashboard Overview</h4>

            <!-- Stats Cards -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 stat-card">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-muted mb-1 small">Total Products</p>
                                    <h3 class="fw-bold" id="statProducts">-</h3>
                                </div>
                                <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                    <i class="fas fa-box fa-lg"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 stat-card">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-muted mb-1 small">Total Orders</p>
                                    <h3 class="fw-bold" id="statOrders">-</h3>
                                </div>
                                <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                    <i class="fas fa-shopping-bag fa-lg"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 stat-card">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-muted mb-1 small">Total Users</p>
                                    <h3 class="fw-bold" id="statUsers">-</h3>
                                </div>
                                <div class="stat-icon bg-success bg-opacity-10 text-success">
                                    <i class="fas fa-users fa-lg"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 stat-card">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-muted mb-1 small">Revenue</p>
                                    <h3 class="fw-bold" id="statRevenue">-</h3>
                                </div>
                                <div class="stat-icon bg-danger bg-opacity-10 text-danger">
                                    <i class="fas fa-yen-sign fa-lg"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Orders -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Recent Orders</h6>
                    <div id="recentOrders"></div>
                </div>
            </div>
        </div>

        <!-- ===== PRODUCTS TAB ===== -->
        <div id="tab-products" class="d-none">
            <div class="d-flex justify-content-between mb-4">
    <h4 class="fw-bold">Products Management</h4>
    <button class="btn btn-warning fw-bold"
            onclick="showTab('addProduct')">
        <i class="fas fa-plus me-2"></i>Add New Product
    </button>
</div>

            <!-- Search Bar -->
            <div class="card border-0 shadow-sm rounded-4 mb-3">
                <div class="card-body p-3">
                    <input type="text"
                           class="form-control"
                           id="productSearch"
                           placeholder="🔍 Search products..."
                           oninput="filterAdminProducts()">
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div id="adminProductsList"></div>
                </div>
            </div>
        </div>

        <!-- ===== ADD PRODUCT TAB ===== -->
        <div id="tab-addProduct" class="d-none">
            <h4 class="fw-bold mb-4">
                <span id="formTitle">Add New Product</span>
            </h4>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="row g-3">
                        <input type="hidden" id="editProductId">

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Product Name *
                            </label>
                            <input type="text"
                                   class="form-control"
                                   id="pName"
                                   placeholder="Samsung Galaxy S24">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Category *
                            </label>
                            <select class="form-select" id="pCategory">
                                <option value="Electronics">
                                    📱 Electronics
                                </option>
                                <option value="Clothing">
                                    👕 Clothing
                                </option>
                                <option value="Food">🍜 Food</option>
                                <option value="Books">📚 Books</option>
                                <option value="Sports">⚽ Sports</option>
                                <option value="Home">🏠 Home</option>
                                <option value="Beauty">💄 Beauty</option>
                                <option value="Toys">🧸 Toys</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                Price (¥) *
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="pPrice"
                                   placeholder="85000"
                                   min="0">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                Stock *
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="pStock"
                                   placeholder="10"
                                   min="0">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                Discount (%)
                            </label>
                            <input type="number"
                                   class="form-control"
                                   id="pDiscount"
                                   placeholder="0"
                                   min="0"
                                   max="100">
                        </div>

                       <!-- Image Upload Section -->
<div class="col-12">
    <label class="form-label fw-semibold">
        Product Image
    </label>

    <!-- Upload Box -->
    <div id="imageUploadBox"
         style="border:2px dashed #dee2e6;
                border-radius:12px;padding:20px;
                text-align:center;cursor:pointer;
                transition:all 0.3s;"
         onclick="document.getElementById('productImageInput').click()"
         ondragover="event.preventDefault();this.style.borderColor='#667eea'"
         ondragleave="this.style.borderColor='#dee2e6'"
         ondrop="handleImageDrop(event)">

        <!-- Preview or Placeholder -->
        <div id="imagePreviewArea">
            <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-2 d-block"></i>
            <p class="text-muted mb-1">
    Click or Drag & Drop here
</p>
            <small class="text-muted">
                JPG, PNG, WEBP — Max 5MB
            </small>
        </div>

        <!-- Upload Progress -->
        <div id="uploadProgress" class="d-none mt-2">
            <div class="progress" style="height:6px;">
                <div class="progress-bar progress-bar-striped
                             progress-bar-animated"
                     style="width:100%"></div>
            </div>
            <small class="text-muted mt-1 d-block">
                Uploading...
            </small>
        </div>
    </div>

    <input type="file"
           id="productImageInput"
           accept="image/*"
           style="display:none;"
           onchange="uploadProductImage(event)">

    <!-- Hidden URL field -->
    <input type="hidden" id="pImage">
</div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">
                                Description
                            </label>
                            <textarea class="form-control"
                                      id="pDesc"
                                      rows="4"
                                      placeholder="Product details...">
                            </textarea>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button class="btn btn-warning fw-bold px-4"
                                    onclick="saveProduct()">
                                <i class="fas fa-save me-2"></i>
                                <span id="saveBtnText">Add Product</span>
                            </button>
                            <button class="btn btn-outline-secondary"
                                    onclick="cancelEdit()">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== ORDERS TAB ===== -->
        <div id="tab-orders" class="d-none">
            <h4 class="fw-bold mb-4">Orders Management</h4>

            <!-- Filter Buttons -->
            <div class="d-flex gap-2 mb-3 flex-wrap">
                <button class="btn btn-dark btn-sm active-filter"
                        onclick="filterOrders('ALL')">
                    All
                </button>
                <button class="btn btn-outline-warning btn-sm"
                        onclick="filterOrders('PENDING')">
                    ⏳ Pending
                </button>
                <button class="btn btn-outline-primary btn-sm"
                        onclick="filterOrders('CONFIRMED')">
                    ✅ Confirmed
                </button>
                <button class="btn btn-outline-info btn-sm"
                        onclick="filterOrders('SHIPPING')">
                    🚚 Shipping
                </button>
                <button class="btn btn-outline-success btn-sm"
                        onclick="filterOrders('DELIVERED')">
                    🎉 Delivered
                </button>
                <button class="btn btn-outline-danger btn-sm"
                        onclick="filterOrders('CANCELLED')">
                    ❌ Cancelled
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div id="adminOrdersList"></div>
                </div>
            </div>
        </div>

        <!-- ===== USERS TAB ===== -->
        <div id="tab-users" class="d-none">
            <h4 class="fw-bold mb-4">Users Management</h4>
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div id="adminUsersList"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
