<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 ShopOsaka</a>
    </div>
</nav>

<!-- Login Card -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">

                    <!-- Title -->
                    <h3 class="fw-bold text-center mb-1">Welcome Back!</h3>
                    <p class="text-muted text-center mb-4">Login to your account</p>

                    <!-- Error Message (default hidden) -->
                    <div id="errorMsg" class="alert alert-danger d-none"></div>

                    <!-- Login Form -->
                    <div id="loginForm">

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope text-muted"></i>
                                </span>
                                <input type="email"
                                       class="form-control"
                                       id="email"
                                       placeholder="ram@gmail.com">
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       placeholder="••••••••">
                                <!-- Show/Hide password button -->
                                <button class="btn btn-outline-secondary"
                                        type="button"
                                        onclick="togglePassword()">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Login Button -->
                        <button class="btn btn-dark w-100 py-2 fw-bold"
                                onclick="login()">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>

                        <!-- Register Link -->
                        <p class="text-center mt-3 mb-0 text-muted">
                            Don't have an account?
                            <a href="/register"
                               class="text-decoration-none fw-bold">
                               Register here
                            </a>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
