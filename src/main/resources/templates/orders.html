<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- सबै pages को navbar मा यति मात्र राख्नुस् -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 ShopOsaka</a>

        <!-- Mobile hamburger button -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
            </ul>
            <!-- main.js ले यहाँ buttons बनाउँछ -->
            <div id="authButtons"></div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="fw-bold mb-4">
        <i class="fas fa-box text-warning"></i> My Orders
    </h3>

    <!-- Login छैन भने -->
    <div id="notLoggedIn" class="d-none text-center py-5">
        <i class="fas fa-lock fa-3x text-muted mb-3"></i>
        <p class="text-muted">Please login to view your orders!</p>
        <a href="/login" class="btn btn-dark">Login</a>
    </div>

    <!-- Orders छैन भने -->
    <div id="noOrders" class="d-none text-center py-5">
        <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
        <p class="text-muted">No orders yet!</p>
        <a href="/" class="btn btn-warning">Start Shopping</a>
    </div>

    <!-- Orders List -->
    <div id="ordersList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/orders.js"></script>
</body>
</html>
