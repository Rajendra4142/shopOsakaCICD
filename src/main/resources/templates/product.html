<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 ShopOsaka</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        <i class="fas fa-arrow-left me-1"></i>
                        Back to Shop
                    </a>
                </li>
            </ul>
            <div id="authButtons"></div>
        </div>
    </div>
</nav>

<!-- Loading Spinner -->
<div id="loadingSection" class="container py-5 text-center">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Loading product...</p>
</div>

<!-- Product Detail -->
<div id="productSection" class="container py-5 d-none">
    <div class="row g-4">

        <!-- Left — Product Image -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4 p-3">
                <!-- Main Image -->
                <img id="mainImage"
                     src=""
                     alt="Product"
                     class="img-fluid rounded-3 w-100"
                     style="height:350px; object-fit:contain;">
            </div>
        </div>

        <!-- Right — Product Info -->
        <div class="col-md-7">
            <!-- Category Badge -->
            <span class="badge bg-secondary mb-2"
                  id="productCategory"></span>

            <!-- Product Name -->
            <h2 class="fw-bold mb-2" id="productName"></h2>

            <!-- Price -->
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="fs-2 fw-bold text-danger"
                      id="productPrice"></span>
            </div>

            <!-- Stock Status -->
            <div class="mb-3" id="stockStatus"></div>

            <!-- Description -->
            <div class="mb-4">
                <h6 class="fw-bold">Description</h6>
                <p class="text-muted" id="productDescription"></p>
            </div>

            <!-- Quantity Selector -->
            <div class="mb-4">
                <h6 class="fw-bold mb-2">Quantity</h6>
                <div class="d-flex align-items-center gap-3">
                    <div class="input-group" style="width:130px;">
                        <button class="btn btn-outline-secondary"
                                onclick="changeQty(-1)">
                            <i class="fas fa-minus"></i>
                        </button>
                        <input type="number"
                               class="form-control text-center fw-bold"
                               id="qtyInput"
                               value="1" min="1">
                        <button class="btn btn-outline-secondary"
                                onclick="changeQty(1)">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <!-- Total Price preview -->
                    <span class="text-muted">
                        Total:
                        <span class="fw-bold text-danger"
                              id="totalPreview"></span>
                    </span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-3 flex-wrap">
                <button class="btn btn-warning fw-bold px-4 py-2"
                        id="addToCartBtn"
                        onclick="addToCart()">
                    <i class="fas fa-cart-plus me-2"></i>
                    Add to Cart
                </button>
                <button class="btn btn-dark fw-bold px-4 py-2"
                        onclick="buyNow()">
                    <i class="fas fa-bolt me-2"></i>
                    Buy Now
                </button>
            </div>

        </div>
    </div>

    <!-- Related Products -->
    <div class="mt-5">
        <h4 class="fw-bold mb-4">Related Products</h4>
        <div class="row g-4" id="relatedProducts"></div>
    </div>

</div>

<!-- Product Not Found -->
<div id="notFoundSection" class="container py-5 text-center d-none">
    <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
    <h4>Product not found!</h4>
    <a href="/" class="btn btn-dark mt-2">Homepage</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/product.js"></script>
</body>
</html>
