<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark"
     style="position:sticky;top:0;z-index:1030;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 ShopOsaka</a>
        <div id="authButtons"></div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">

        <!-- LEFT — Profile Card -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 text-center p-4">

                <!-- Profile Photo Upload -->
                <div class="position-relative d-inline-block mx-auto mb-3">
                    <img id="profilePhotoImg"
                         src=""
                         class="rounded-circle"
                         style="width:120px;height:120px;
                                object-fit:cover;
                                border:3px solid #667eea;">

                    <!-- Camera Upload Button -->
                    <label for="photoFileInput"
                           title="Upload Photo"
                           style="position:absolute;bottom:0;right:0;
                                  width:34px;height:34px;
                                  background:linear-gradient(135deg,#667eea,#764ba2);
                                  border-radius:50%;cursor:pointer;
                                  display:flex;align-items:center;
                                  justify-content:center;
                                  box-shadow:0 2px 8px rgba(0,0,0,0.3);">
                        <i class="fas fa-camera text-white"
                           style="font-size:13px;"></i>
                    </label>
                    <input type="file"
                           id="photoFileInput"
                           accept="image/*"
                           style="display:none;"
                           onchange="uploadProfilePhoto(event)">

                    <!-- Upload Loading -->
                    <div id="uploadLoading"
                         style="display:none;position:absolute;
                                top:0;left:0;width:120px;height:120px;
                                background:rgba(0,0,0,0.5);
                                border-radius:50%;
                                align-items:center;
                                justify-content:center;color:white;">
                        <i class="fas fa-spinner fa-spin fa-lg"></i>
                    </div>
                </div>

                <h5 class="fw-bold mb-0" id="profileName">-</h5>
                <p class="text-muted small" id="profileEmail">-</p>
                <span class="badge bg-primary" id="profileRole">-</span>
                <div class="mt-1" id="verifiedBadge"></div>

                <hr>

                <!-- Quick Links -->
                <div class="d-grid gap-2">
                    <a href="/orders" class="btn btn-outline-dark btn-sm">
                        <i class="fas fa-box me-1"></i>My Orders
                    </a>
                    <button class="btn btn-outline-danger btn-sm"
                            onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT — Edit Form -->
        <div class="col-md-8">

            <!-- Messages -->
            <div id="successMsg" class="alert alert-success d-none"></div>
            <div id="errorMsg" class="alert alert-danger d-none"></div>

            <!-- Basic Info Card -->
            <div class="card border-0 shadow-sm rounded-4 mb-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">
                        <i class="fas fa-user-edit text-warning me-2"></i>
                        Basic Information
                    </h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">
                                Full Name
                            </label>
                            <input type="text" class="form-control"
                                   id="editName" placeholder="Ram Sharma">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">
                                Email
                                <span class="badge bg-secondary ms-1"
                                      style="font-size:10px;">
                                    Not Editable
                                </span>
                            </label>
                            <input type="email" class="form-control bg-light"
                                   id="editEmail" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">
                                Phone
                            </label>
                            <input type="tel" class="form-control"
                                   id="editPhone"
                                   placeholder="+977-98XXXXXXXX">
                        </div>
                        <div class="col-12 text-end">
                            <button class="btn btn-warning fw-bold px-4"
                                    id="saveInfoBtn"
                                    onclick="saveBasicInfo()">
                                <i class="fas fa-save me-2"></i>
                                Save Changes
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Delivery Address Card -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">
                        <i class="fas fa-map-marker-alt text-danger me-2"></i>
                        Delivery Address
                    </h5>

                    <!-- Saved Address Display -->
                    <div id="savedAddressDisplay" class="d-none">
                        <div class="border rounded-3 p-3 bg-light mb-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="fw-bold small mb-1">
                                        <i class="fas fa-home text-primary me-1"></i>
                                        Home Address
                                    </div>
                                    <div class="text-muted small"
                                         id="savedAddressText"></div>
                                </div>
                                <span class="badge bg-success">Default</span>
                            </div>
                        </div>
                        <button class="btn btn-outline-primary btn-sm"
                                onclick="toggleAddressEdit()">
                            <i class="fas fa-edit me-1"></i>
                            Edit Address
                        </button>
                    </div>

                    <!-- Address Edit Form -->
                    <div id="addressEditForm">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold small">
                                    〒 Postal Code
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">〒</span>
                                    <input type="text"
                                           class="form-control"
                                           id="editPostalCode"
                                           placeholder="1234567"
                                           maxlength="7"
                                           oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                                    <button class="btn btn-outline-primary"
                                            type="button"
                                            id="profileAutoFillBtn"
                                            onclick="profileLookupPostal()">
                                        <i class="fas fa-search"></i>
                                        Auto Fill
                                    </button>
                                </div>
                                <small class="text-muted">
                                    7 digits → Auto Fill
                                </small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">
                                    Prefecture
                                </label>
                                <input type="text" class="form-control"
                                       id="editPrefecture"
                                       placeholder="大阪府">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">
                                    City / Town
                                </label>
                                <input type="text" class="form-control"
                                       id="editCity"
                                       placeholder="大阪市北区">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold small">
                                    Detailed Address
                                </label>
                                <input type="text" class="form-control"
                                       id="editAddressLine"
                                       placeholder="梅田1-1-1 101号室">
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button class="btn btn-warning fw-bold px-4"
                                        id="saveAddressBtn"
                                        onclick="saveAddress()">
                                    <i class="fas fa-save me-2"></i>
                                    Save Address
                                </button>
                                <button class="btn btn-outline-secondary"
                                        id="cancelAddressBtn"
                                        onclick="toggleAddressEdit()"
                                        style="display:none!important;">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
