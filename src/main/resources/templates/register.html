<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 ShopOsaka</a>
    </div>
</nav>

<!-- Register Card -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">

                    <!-- Title -->
                    <h3 class="fw-bold text-center mb-1">Create Account</h3>
                    <p class="text-muted text-center mb-4">Join ShopOsaka today!</p>

                    <!-- Messages -->
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <div id="successMsg" class="alert alert-success d-none"></div>

                    <!-- Register Form -->
                    <div id="registerForm">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user text-muted"></i>
                                </span>
                                <input type="text"
                                       class="form-control"
                                       id="fullName"
                                       placeholder="Ram Sharma">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope text-muted"></i>
                                </span>
                                <input type="email"
                                       class="form-control"
                                       id="email"
                                       placeholder="ram@gmail.com">
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       placeholder="minimum 6 characters">
                                <button class="btn btn-outline-secondary"
                                        type="button"
                                        onclick="togglePassword()">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Confirm Password
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       class="form-control"
                                       id="confirmPassword"
                                       placeholder="Re-enter your password">
                            </div>
                        </div>

                        <!-- Register Button -->
                        <button class="btn btn-dark w-100 py-2 fw-bold"
                                onclick="register()">
                            <i class="fas fa-user-plus me-2"></i>Register
                        </button>

                        <!-- Login Link -->
                        <p class="text-center mt-3 mb-0 text-muted">
                            Re-enter your password?
                            <a href="/login"
                               class="text-decoration-none fw-bold">
                               Login here
                            </a>
                        </p>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
