<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email - ShopOsaka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 ShopOsaka</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <!-- Email Icon -->
                    <div class="mb-4">
                        <div style="width:80px; height:80px;
                                    background:linear-gradient(
                                        135deg,#667eea,#764ba2);
                                    border-radius:50%;
                                    margin:0 auto;
                                    display:flex;
                                    align-items:center;
                                    justify-content:center;">
                            <i class="fas fa-envelope fa-2x
                                      text-white"></i>
                        </div>
                    </div>

                    <h4 class="fw-bold mb-2">
                        Verify Your Email!
                    </h4>
                    <p class="text-muted mb-4">
                        An OTP code has been sent to <span id="emailDisplay"></span>.
                    </p>

                    <!-- Messages -->
                    <div id="errorMsg"
                         class="alert alert-danger d-none"></div>
                    <div id="successMsg"
                         class="alert alert-success d-none"></div>

                    <!-- OTP Input — 6 boxes -->
                    <div class="d-flex justify-content-center
                                gap-2 mb-4">
                        <input type="text" maxlength="1"
                               class="otp-input form-control
                                      text-center fw-bold fs-4"
                               style="width:50px; height:55px;"
                               id="otp0"
                               oninput="otpInput(0)">
                        <input type="text" maxlength="1"
                               class="otp-input form-control
                                      text-center fw-bold fs-4"
                               style="width:50px; height:55px;"
                               id="otp1"
                               oninput="otpInput(1)">
                        <input type="text" maxlength="1"
                               class="otp-input form-control
                                      text-center fw-bold fs-4"
                               style="width:50px; height:55px;"
                               id="otp2"
                               oninput="otpInput(2)">
                        <input type="text" maxlength="1"
                               class="otp-input form-control
                                      text-center fw-bold fs-4"
                               style="width:50px; height:55px;"
                               id="otp3"
                               oninput="otpInput(3)">
                        <input type="text" maxlength="1"
                               class="otp-input form-control
                                      text-center fw-bold fs-4"
                               style="width:50px; height:55px;"
                               id="otp4"
                               oninput="otpInput(4)">
                        <input type="text" maxlength="1"
                               class="otp-input form-control
                                      text-center fw-bold fs-4"
                               style="width:50px; height:55px;"
                               id="otp5"
                               oninput="otpInput(5)">
                    </div>

                    <!-- Verify Button -->
                    <button class="btn btn-dark w-100 py-2 fw-bold"
                            onclick="verifyOtp()">
                        <i class="fas fa-check-circle me-2"></i>
                        Verify Email
                    </button>

                    <!-- Resend -->
                    <p class="text-muted mt-3 mb-0 small">
                        Didn't receive OTP?
                        <a href="#" onclick="resendOtp()"
                           class="text-decoration-none fw-bold">
                            Resend OTP
                        </a>
                    </p>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/verify-email.js"></script>
</body>
</html>
